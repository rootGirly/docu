name: byteDoc

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-docu
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Zensical
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install zensical

      - name: Build
        run: |
          source .venv/bin/activate
          zensical build

      - name: Verify build output
        run: |
          test -f site/index.html || (echo "::error::Build produced no index.html" && exit 1)

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            site/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/docu.bytegirl

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
